<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
  <title>Primevest | Admin Login</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #1E7B4B;
      --primary-dark: #0B4F2E;
      --primary-light: #4CAF7C;
      --primary-soft: #E8F5E9;
      --accent: #2DD4BF;
      --white: #FFFFFF;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-400: #9CA3AF;
      --gray-500: #6B7280;
      --gray-600: #4B5563;
      --gray-700: #374151;
      --gray-800: #1F2937;
      --gray-900: #111827;
      --success: #10B981;
      --warning: #F59E0B;
      --error: #EF4444;
      --info: #3B82F6;
      
      --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1);
      
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 24px;
      --radius-full: 9999px;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(145deg, #F0F9F0 0%, #FFFFFF 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(30,123,75,0.03) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -50%;
      left: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(45,212,191,0.03) 0%, transparent 70%);
      border-radius: 50%;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 10;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toast System */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      .toast-container {
        top: 16px;
        right: 16px;
        left: 16px;
      }
    }

    .toast {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      box-shadow: var(--shadow-lg);
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 300px;
      max-width: 380px;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      border-left: 4px solid;
      pointer-events: auto;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.success {
      border-left-color: var(--success);
    }

    .toast.success .toast-icon {
      color: var(--success);
      background: rgba(16,185,129,0.1);
    }

    .toast.error {
      border-left-color: var(--error);
    }

    .toast.error .toast-icon {
      color: var(--error);
      background: rgba(239,68,68,0.1);
    }

    .toast.warning {
      border-left-color: var(--warning);
    }

    .toast.warning .toast-icon {
      color: var(--warning);
      background: rgba(245,158,11,0.1);
    }

    .toast.info {
      border-left-color: var(--primary);
    }

    .toast.info .toast-icon {
      color: var(--primary);
      background: rgba(30,123,75,0.1);
    }

    .toast-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .toast-content {
      flex: 1;
    }

    .toast-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--gray-800);
      margin-bottom: 2px;
    }

    .toast-message {
      font-size: 12px;
      color: var(--gray-500);
      line-height: 1.4;
    }

    .toast-close {
      color: var(--gray-400);
      cursor: pointer;
      font-size: 14px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .toast-close:hover {
      background: var(--gray-100);
      color: var(--gray-700);
    }

    /* Admin Badge */
    .admin-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 8px 16px;
      border-radius: 40px;
      width: fit-content;
      margin: 0 auto 24px;
      font-weight: 600;
      font-size: 14px;
      box-shadow: var(--shadow-md);
    }

    .admin-badge i {
      font-size: 16px;
    }

    /* Login Card */
    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: var(--radius-2xl);
      padding: 32px;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(30,123,75,0.1);
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 24px;
      }
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-wrapper {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 60px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(30,123,75,0.15);
      margin-bottom: 20px;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      transform: rotate(-5deg);
      transition: transform 0.3s;
    }

    .logo-wrapper:hover .logo-icon {
      transform: rotate(0deg);
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(145deg, var(--primary-dark), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .title {
      font-size: 28px;
      font-weight: 700;
      color: var(--gray-800);
      margin-bottom: 8px;
    }

    .subtitle {
      color: var(--gray-500);
      font-size: 15px;
    }

    /* Security Badges */
    .security-badges {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .security-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--gray-50);
      padding: 6px 12px;
      border-radius: var(--radius-full);
      font-size: 12px;
      color: var(--gray-600);
    }

    .security-badge i {
      color: var(--primary);
      font-size: 12px;
    }

    /* Form */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 8px;
    }

    .form-label i {
      color: var(--primary);
      font-size: 14px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-prefix {
      position: absolute;
      left: 14px;
      color: var(--gray-400);
      font-size: 16px;
      z-index: 2;
    }

    .form-input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: var(--gray-50);
      border: 2px solid transparent;
      border-radius: var(--radius-lg);
      font-size: 15px;
      font-family: inherit;
      color: var(--gray-800);
      transition: all 0.3s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(30,123,75,0.1);
    }

    .form-input.error {
      border-color: var(--error);
      background: rgba(239,68,68,0.05);
    }

    .input-suffix {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--gray-400);
      cursor: pointer;
      font-size: 16px;
      padding: 8px;
      transition: color 0.2s;
    }

    .input-suffix:hover {
      color: var(--primary);
    }

    /* Remember & Forgot */
    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px 0 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .remember-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
    }

    .checkbox-label {
      font-size: 13px;
      color: var(--gray-600);
    }

    .forgot-link {
      color: var(--primary);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover {
      color: var(--primary-dark);
      text-decoration: underline;
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(145deg, var(--primary), var(--primary-dark));
      border: none;
      border-radius: var(--radius-lg);
      color: white;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 20px -5px rgba(30,123,75,0.4);
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 25px -8px rgba(30,123,75,0.5);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .submit-btn i {
      transition: transform 0.3s;
    }

    .submit-btn:hover:not(:disabled) i {
      transform: translateX(5px);
    }

    /* Failed Attempts Warning */
    .attempts-warning {
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.2);
      border-radius: var(--radius-lg);
      padding: 12px;
      margin: 16px 0;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .attempts-warning.show {
      display: flex;
    }

    .attempts-icon {
      width: 32px;
      height: 32px;
      background: rgba(245,158,11,0.1);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--warning);
      font-size: 16px;
      flex-shrink: 0;
    }

    .attempts-text {
      flex: 1;
      font-size: 13px;
      color: var(--gray-600);
    }

    .attempts-text strong {
      color: var(--warning);
    }

    /* IP Info */
    .ip-info {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .ip-address {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--gray-500);
    }

    .ip-address i {
      color: var(--primary);
    }

    .device-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--gray-500);
    }

    /* Back to Site */
    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      color: var(--gray-500);
      font-size: 13px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: var(--primary);
    }

    .back-link i {
      font-size: 12px;
    }

    /* Loading Spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .title {
        font-size: 24px;
      }
      
      .security-badges {
        gap: 8px;
      }
      
      .security-badge {
        padding: 4px 10px;
        font-size: 11px;
      }
      
      .form-options {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <!-- Admin Badge -->
    <div class="admin-badge">
      <i class="fas fa-shield-alt"></i>
      <span>Administrator Access</span>
      <i class="fas fa-shield-alt"></i>
    </div>

    <!-- Login Card -->
    <div class="login-card">
      <!-- Header -->
      <div class="header">
        <div class="logo-wrapper">
          <div class="logo-icon">
            <i class="fas fa-chart-line"></i>
          </div>
          <span class="logo-text">Primevest</span>
        </div>
        <h1 class="title">Admin Login</h1>
        <p class="subtitle">Secure access to management dashboard</p>
      </div>

      <!-- Security Badges -->
      <div class="security-badges">
        <div class="security-badge">
          <i class="fas fa-lock"></i>
          <span>256-bit SSL</span>
        </div>
        <div class="security-badge">
          <i class="fas fa-shield"></i>
          <span>2FA Ready</span>
        </div>
        <div class="security-badge">
          <i class="fas fa-clock"></i>
          <span>Auto-logout 15min</span>
        </div>
      </div>

      <!-- Failed Attempts Warning -->
      <div class="attempts-warning" id="attemptsWarning">
        <div class="attempts-icon">
          <i class="fas fa-exclamation-triangle"></i>
        </div>
        <div class="attempts-text">
          <strong>3 failed attempts</strong> remaining before temporary lockout
        </div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="event.preventDefault(); handleLogin()">
        <!-- Email -->
        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-envelope"></i>
            Admin Email
          </label>
          <div class="input-wrapper">
            <span class="input-prefix"><i class="fas fa-envelope"></i></span>
            <input 
              type="email" 
              class="form-input" 
              id="email" 
              placeholder="admin@primevest.com"
              autocomplete="email"
              required
            >
          </div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label">
            <i class="fas fa-lock"></i>
            Password
          </label>
          <div class="input-wrapper">
            <span class="input-prefix"><i class="fas fa-lock"></i></span>
            <input 
              type="password" 
              class="form-input" 
              id="password" 
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            >
            <button 
              type="button" 
              class="input-suffix" 
              onclick="togglePassword()"
              tabindex="-1"
            >
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <!-- Remember & Forgot -->
        <div class="form-options">
          <label class="remember-checkbox">
            <input type="checkbox" class="checkbox" id="remember">
            <span class="checkbox-label">Remember this device</span>
          </label>
          <a href="#" class="forgot-link" onclick="showForgotPassword()">
            Forgot password?
          </a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="submit-btn" id="loginBtn">
          <span>Access Dashboard</span>
          <i class="fas fa-arrow-right"></i>
        </button>
      </form>

      <!-- IP & Device Info -->
      <div class="ip-info">
        <div class="ip-address">
          <i class="fas fa-network-wired"></i>
          <span id="ipAddress">Loading IP...</span>
        </div>
        <div class="device-info">
          <i class="fas fa-laptop"></i>
          <span id="deviceInfo">Loading device...</span>
        </div>
      </div>

      <!-- Back to Site -->
      <div class="back-link">
        <a href="home.html">
          <i class="fas fa-arrow-left"></i>
          Back to Primevest
        </a>
      </div>
    </div>
  </div>

  <script>
    // ==================== FIREBASE CONFIG ====================
    const firebaseConfig = {
      apiKey: "AIzaSyAi8lV4LUb57ele6K1wo73vc13mGz1v9B0",
      authDomain: "primevest-5208c.firebaseapp.com",
      projectId: "primevest-5208c",
      storageBucket: "primevest-5208c.firebasestorage.app",
      messagingSenderId: "76160486147",
      appId: "1:76160486147:web:5b5853f9772503daa7b736"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();

    // ==================== GLOBAL VARIABLES ====================
    let failedAttempts = 0;
    let lockoutUntil = null;

    // ==================== TOAST SYSTEM ====================
    function showToast({ type = 'info', title, message, duration = 4000 }) {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-exclamation-circle',
        warning: 'fa-exclamation-triangle',
        info: 'fa-info-circle'
      };

      toast.innerHTML = `
        <div class="toast-icon">
          <i class="fas ${icons[type]}"></i>
        </div>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
          <div class="toast-message">${message}</div>
        </div>
        <div class="toast-close" onclick="this.parentElement.remove()">
          <i class="fas fa-times"></i>
        </div>
      `;

      container.appendChild(toast);
      setTimeout(() => toast.classList.add('show'), 10);

      if (duration) {
        setTimeout(() => {
          toast.classList.remove('show');
          setTimeout(() => toast.remove(), 400);
        }, duration);
      }
    }

    // ==================== TOGGLE PASSWORD ====================
    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('toggleIcon');
      
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye';
      }
    }

    // ==================== GET IP & DEVICE INFO ====================
    async function getIpInfo() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        document.getElementById('ipAddress').textContent = data.ip;
      } catch (error) {
        document.getElementById('ipAddress').textContent = 'Unable to fetch';
      }

      // Get device info
      const userAgent = navigator.userAgent;
      let device = 'Unknown';
      
      if (userAgent.match(/Android/i)) device = 'Android';
      else if (userAgent.match(/iPhone|iPad|iPod/i)) device = 'iOS';
      else if (userAgent.match(/Windows/i)) device = 'Windows';
      else if (userAgent.match(/Mac/i)) device = 'Mac';
      else if (userAgent.match(/Linux/i)) device = 'Linux';
      
      document.getElementById('deviceInfo').textContent = device;
    }

    // ==================== CHECK ADMIN STATUS ====================
    async function checkAdminStatus(uid) {
      try {
        const userDoc = await db.collection('users').doc(uid).get();
        if (!userDoc.exists) return false;
        
        const userData = userDoc.data();
        return userData.isAdmin === true;
      } catch (error) {
        console.error('Error checking admin status:', error);
        return false;
      }
    }

    // ==================== HANDLE LOGIN ====================
    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const remember = document.getElementById('remember').checked;
      const btn = document.getElementById('loginBtn');

      // Check if locked out
      if (lockoutUntil && new Date() < lockoutUntil) {
        const minutesLeft = Math.ceil((lockoutUntil - new Date()) / 60000);
        showToast({
          type: 'error',
          title: 'Account Locked',
          message: `Too many failed attempts. Try again in ${minutesLeft} minutes.`
        });
        return;
      }

      if (!email || !password) {
        showToast({
          type: 'warning',
          title: 'Missing Information',
          message: 'Please enter both email and password'
        });
        return;
      }

      // Disable button
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Verifying...';

      try {
        // Attempt login
        const userCredential = await auth.signInWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Check if admin
        const isAdmin = await checkAdminStatus(user.uid);

        if (!isAdmin) {
          // Not an admin - sign out and show error
          await auth.signOut();
          
          failedAttempts++;
          updateFailedAttempts();
          
          showToast({
            type: 'error',
            title: 'Access Denied',
            message: 'You do not have administrator privileges.'
          });
          
          btn.disabled = false;
          btn.innerHTML = '<span>Access Dashboard</span><i class="fas fa-arrow-right"></i>';
          return;
        }

        // Admin login successful
        failedAttempts = 0;
        document.getElementById('attemptsWarning').classList.remove('show');

        // Set persistence based on remember me
        await auth.setPersistence(
          remember ? 'local' : 'session'
        );

        // Log admin login
        try {
          await db.collection('adminLogs').add({
            adminId: user.uid,
            adminEmail: email,
            ip: document.getElementById('ipAddress').textContent,
            device: document.getElementById('deviceInfo').textContent,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            action: 'login'
          });
        } catch (e) {
          console.warn('Could not log admin action:', e);
        }

        // Show success
        showToast({
          type: 'success',
          title: 'Welcome Admin!',
          message: 'Redirecting to dashboard...',
          duration: 1500
        });

        // Redirect to admin dashboard
        setTimeout(() => {
          window.location.href = 'admin-dashboard.html';
        }, 1500);

      } catch (error) {
        console.error('Login error:', error);

        failedAttempts++;
        updateFailedAttempts();

        let message = 'Login failed. Please check your credentials.';
        let title = 'Login Failed';

        if (error.code === 'auth/user-not-found') {
          title = 'Account Not Found';
          message = 'No admin account found with this email.';
        } else if (error.code === 'auth/wrong-password') {
          title = 'Incorrect Password';
          message = 'The password you entered is incorrect.';
        } else if (error.code === 'auth/too-many-requests') {
          title = 'Too Many Attempts';
          message = 'Account temporarily locked. Please try again later.';
          
          // Set lockout for 15 minutes
          lockoutUntil = new Date(Date.now() + 15 * 60000);
        }

        showToast({
          type: 'error',
          title: title,
          message: message,
          duration: 5000
        });

        btn.disabled = false;
        btn.innerHTML = '<span>Access Dashboard</span><i class="fas fa-arrow-right"></i>';
      }
    }

    // ==================== UPDATE FAILED ATTEMPTS ====================
    function updateFailedAttempts() {
      const warningEl = document.getElementById('attemptsWarning');
      const remaining = 5 - failedAttempts;
      
      if (failedAttempts >= 5) {
        warningEl.innerHTML = `
          <div class="attempts-icon">
            <i class="fas fa-lock"></i>
          </div>
          <div class="attempts-text">
            <strong>Account locked</strong> for 15 minutes due to too many failed attempts
          </div>
        `;
        warningEl.classList.add('show');
      } else if (failedAttempts >= 2) {
        warningEl.innerHTML = `
          <div class="attempts-icon">
            <i class="fas fa-exclamation-triangle"></i>
          </div>
          <div class="attempts-text">
            <strong>${remaining} failed attempts</strong> remaining before temporary lockout
          </div>
        `;
        warningEl.classList.add('show');
      } else {
        warningEl.classList.remove('show');
      }
    }

    // ==================== FORGOT PASSWORD ====================
    function showForgotPassword() {
      const email = document.getElementById('email').value.trim();
      
      if (!email) {
        showToast({
          type: 'warning',
          title: 'Email Required',
          message: 'Please enter your admin email first'
        });
        return;
      }

      auth.sendPasswordResetEmail(email)
        .then(() => {
          showToast({
            type: 'success',
            title: 'Reset Email Sent',
            message: 'Check your inbox for password reset instructions'
          });
        })
        .catch((error) => {
          let message = 'Failed to send reset email';
          if (error.code === 'auth/user-not-found') {
            message = 'No account found with this email';
          }
          showToast({
            type: 'error',
            title: 'Error',
            message: message
          });
        });
    }

    // ==================== CHECK EXISTING SESSION ====================
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        // Check if user is admin
        const isAdmin = await checkAdminStatus(user.uid);
        if (isAdmin) {
          // Already logged in as admin, redirect to dashboard
          window.location.href = 'admin-dashboard.html';
        }
      }
    });

    // ==================== INIT ====================
    getIpInfo();

    // Expose functions globally
    window.togglePassword = togglePassword;
    window.showForgotPassword = showForgotPassword;
  </script>
</body>
</html>
