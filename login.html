<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Primevest | Login to Your Account</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<!-- Font Awesome & Google Fonts -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  /* Your existing styles - keep them exactly as you had */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --green-deep: #0B4F2E;
    --green-primary: #1E7B4B;
    --green-vibrant: #2E9B5C;
    --green-light: #4CAF7C;
    --green-mint: #E8F5E9;
    --green-soft: #C8E6C9;
    --green-bg: #F0F9F0;
    
    --neutral-900: #1A2E1A;
    --neutral-700: #2D3F2D;
    --neutral-500: #5A6B5A;
    --neutral-300: #A5B8A5;
    --neutral-100: #EAF0EA;
    
    --success: #00A86B;
    --warning: #FFB800;
    --error: #FF4444;
    
    --shadow-sm: 0 4px 6px -1px rgba(11, 79, 46, 0.1);
    --shadow-md: 0 10px 25px -5px rgba(11, 79, 46, 0.15);
    --shadow-lg: 0 20px 40px -10px rgba(11, 79, 46, 0.2);
  }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(145deg, var(--green-bg) 0%, #FFFFFF 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(30, 123, 75, 0.08) 0%, transparent 70%);
    top: -200px;
    right: -200px;
    border-radius: 50%;
    z-index: 0;
  }

  body::after {
    content: '';
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(76, 175, 124, 0.06) 0%, transparent 70%);
    bottom: -100px;
    left: -100px;
    border-radius: 50%;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 10;
    animation: slideUp 0.6s ease-out;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Toast System */
  .toast-container {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 12px;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    .toast-container {
      top: 16px;
      right: 16px;
      left: 16px;
    }
  }

  .toast {
    background: white;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 14px;
    min-width: 320px;
    max-width: 400px;
    transform: translateX(120%);
    transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    border-left: 4px solid;
    pointer-events: auto;
  }

  @media (max-width: 480px) {
    .toast {
      min-width: auto;
      width: 100%;
      max-width: 100%;
    }
  }

  .toast.show {
    transform: translateX(0);
  }

  .toast.success {
    border-left-color: var(--success);
  }

  .toast.success .toast-icon {
    background: rgba(0, 168, 107, 0.15);
    color: var(--success);
  }

  .toast.error {
    border-left-color: var(--error);
  }

  .toast.error .toast-icon {
    background: rgba(255, 68, 68, 0.15);
    color: var(--error);
  }

  .toast.warning {
    border-left-color: var(--warning);
  }

  .toast.warning .toast-icon {
    background: rgba(255, 184, 0, 0.15);
    color: var(--warning);
  }

  .toast.info {
    border-left-color: var(--green-primary);
  }

  .toast.info .toast-icon {
    background: rgba(30, 123, 75, 0.15);
    color: var(--green-primary);
  }

  .toast-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .toast-content {
    flex: 1;
  }

  .toast-title {
    font-weight: 700;
    font-size: 15px;
    color: var(--neutral-900);
    margin-bottom: 4px;
  }

  .toast-message {
    font-size: 13px;
    color: var(--neutral-500);
    line-height: 1.4;
  }

  .toast-close {
    color: var(--neutral-300);
    cursor: pointer;
    font-size: 14px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .toast-close:hover {
    color: var(--neutral-700);
  }

  /* Header/Brand Section */
  .brand-section {
    text-align: center;
    margin-bottom: 32px;
  }

  @media (max-width: 480px) {
    .brand-section {
      margin-bottom: 24px;
    }
  }

  .logo-wrapper {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(255, 255, 255, 0.9);
    backdrop-filter: blur(10px);
    padding: 10px 20px;
    border-radius: 60px;
    box-shadow: var(--shadow-md);
    border: 1px solid rgba(30, 123, 75, 0.15);
    margin-bottom: 24px;
  }

  @media (max-width: 480px) {
    .logo-wrapper {
      padding: 8px 16px;
      margin-bottom: 20px;
    }
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(145deg, var(--green-primary), var(--green-deep));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    transform: rotate(-5deg);
    transition: transform 0.3s;
  }

  .logo-wrapper:hover .logo-icon {
    transform: rotate(0deg);
  }

  .logo-text {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(145deg, var(--green-deep), var(--green-primary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  @media (max-width: 480px) {
    .logo-text {
      font-size: 20px;
    }
  }

  .brand-tagline {
    font-size: 28px;
    font-weight: 700;
    color: var(--neutral-900);
    margin-bottom: 8px;
  }

  @media (max-width: 480px) {
    .brand-tagline {
      font-size: 24px;
    }
  }

  .brand-tagline span {
    background: linear-gradient(145deg, var(--green-primary), var(--green-vibrant));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .brand-sub {
    color: var(--neutral-500);
    font-size: 15px;
    font-weight: 500;
  }

  /* Login Card */
  .login-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 28px;
    padding: 32px;
    box-shadow: var(--shadow-lg);
    border: 1px solid rgba(30, 123, 75, 0.1);
  }

  @media (max-width: 480px) {
    .login-card {
      padding: 24px;
      border-radius: 24px;
    }
  }

  /* Form Fields */
  .form-group {
    margin-bottom: 24px;
  }

  .form-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    color: var(--neutral-700);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .form-label i {
    color: var(--green-primary);
    font-size: 14px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-prefix {
    position: absolute;
    left: 16px;
    color: var(--neutral-500);
    font-size: 15px;
    z-index: 2;
  }

  .form-input {
    width: 100%;
    padding: 16px 16px 16px 48px;
    background: var(--neutral-100);
    border: 2px solid transparent;
    border-radius: 18px;
    font-size: 15px;
    font-weight: 500;
    font-family: inherit;
    color: var(--neutral-900);
    transition: all 0.3s;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--green-primary);
    background: white;
    box-shadow: 0 0 0 4px rgba(30, 123, 75, 0.15);
  }

  .form-input.error {
    border-color: var(--error);
    background: rgba(255, 68, 68, 0.05);
  }

  .input-suffix {
    position: absolute;
    right: 16px;
    background: none;
    border: none;
    color: var(--neutral-500);
    cursor: pointer;
    font-size: 16px;
    transition: color 0.2s;
    padding: 8px;
  }

  .input-suffix:hover {
    color: var(--green-primary);
  }

  .forgot-password {
    text-align: right;
    margin-top: 8px;
  }

  .forgot-link {
    color: var(--neutral-500);
    font-size: 13px;
    font-weight: 600;
    text-decoration: none;
    transition: color 0.2s;
  }

  .forgot-link:hover {
    color: var(--green-primary);
  }

  /* Submit Button */
  .submit-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(145deg, var(--green-primary), var(--green-deep));
    border: none;
    border-radius: 18px;
    color: white;
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 10px 20px -5px rgba(30, 123, 75, 0.4);
    margin-top: 32px;
  }

  @media (max-width: 480px) {
    .submit-btn {
      padding: 16px;
      font-size: 16px;
    }
  }

  .submit-btn:hover:not(:disabled) {
    transform: translateY(-3px);
    box-shadow: 0 20px 30px -8px rgba(30, 123, 75, 0.5);
  }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .submit-btn i {
    transition: transform 0.3s;
  }

  .submit-btn:hover:not(:disabled) i {
    transform: translateX(5px);
  }

  /* Signup Link */
  .signup-section {
    text-align: center;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--neutral-100);
  }

  .signup-text {
    color: var(--neutral-500);
    font-size: 14px;
    font-weight: 500;
  }

  .signup-link {
    color: var(--green-primary);
    font-weight: 700;
    text-decoration: none;
    margin-left: 6px;
    transition: color 0.2s;
  }

  .signup-link:hover {
    color: var(--green-deep);
    text-decoration: underline;
  }

  /* Loading Spinner */
  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .page-end {
    height: 10px;
  }
</style>
</head>
<body>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<div class="container">
  <!-- Brand Section -->
  <div class="brand-section">
    <div class="logo-wrapper">
      <div class="logo-icon">
        <i class="fas fa-chart-line"></i>
      </div>
      <span class="logo-text">Primevest</span>
    </div>
    <h1 class="brand-tagline">
      Welcome <span>Back</span>
    </h1>
    <p class="brand-sub">Login to continue your investment journey</p>
  </div>

  <!-- Login Card -->
  <div class="login-card">
    <form id="loginForm" onsubmit="event.preventDefault(); handleLogin()">
      <!-- Email Field -->
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-envelope"></i>
          Email Address
        </label>
        <div class="input-wrapper">
          <span class="input-prefix"><i class="fas fa-envelope"></i></span>
          <input 
            type="email" 
            class="form-input" 
            id="emailInput" 
            placeholder="hello@primevest.com"
            autocomplete="email"
            required
          >
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-lock"></i>
          Password
        </label>
        <div class="input-wrapper">
          <span class="input-prefix"><i class="fas fa-lock"></i></span>
          <input 
            type="password" 
            class="form-input" 
            id="passwordInput" 
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
          <button 
            type="button" 
            class="input-suffix" 
            onclick="togglePassword()"
            tabindex="-1"
          >
            <i class="fas fa-eye" id="toggleIcon"></i>
          </button>
        </div>
        
        <!-- Forgot Password Link -->
        <div class="forgot-password">
          <a href="#" class="forgot-link" onclick="showForgotPassword()">
            Forgot password?
          </a>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="submit-btn" id="loginBtn">
        <span>Login to Dashboard</span>
        <i class="fas fa-arrow-right"></i>
      </button>
    </form>

    <!-- Signup Link -->
    <div class="signup-section">
      <span class="signup-text">New to Primevest?</span>
      <a href="signup.html" class="signup-link">Create Account</a>
    </div>
  </div>
</div>

<div class="page-end"></div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyAi8lV4LUb57ele6K1wo73vc13mGz1v9B0",
  authDomain: "primevest-5208c.firebaseapp.com",
  projectId: "primevest-5208c",
  storageBucket: "primevest-5208c.firebasestorage.app",
  messagingSenderId: "76160486147",
  appId: "1:76160486147:web:5b5853f9772503daa7b736"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ==================== CHECK IF ALREADY LOGGED IN ====================
// This prevents logged-in users from seeing the login page
auth.onAuthStateChanged((user) => {
  if (user) {
    console.log('User already logged in, redirecting to home.html');
    window.location.href = 'home.html';
  }
});

// ==================== TOAST SYSTEM ====================
function showToast({ type = 'info', title, message, duration = 4000 }) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  
  const icons = {
    success: 'fa-check-circle',
    error: 'fa-exclamation-circle',
    warning: 'fa-exclamation-triangle',
    info: 'fa-info-circle'
  };

  toast.innerHTML = `
    <div class="toast-icon">
      <i class="fas ${icons[type]}"></i>
    </div>
    <div class="toast-content">
      <div class="toast-title">${title}</div>
      <div class="toast-message">${message}</div>
    </div>
    <div class="toast-close" onclick="this.parentElement.remove()">
      <i class="fas fa-times"></i>
    </div>
  `;

  container.appendChild(toast);
  setTimeout(() => toast.classList.add('show'), 10);

  if (duration) {
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, duration);
  }
}

// ==================== TOGGLE PASSWORD ====================
function togglePassword() {
  const input = document.getElementById('passwordInput');
  const icon = document.getElementById('toggleIcon');
  
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fas fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fas fa-eye';
  }
}

// ==================== FORGOT PASSWORD ====================
function showForgotPassword() {
  const email = document.getElementById('emailInput').value.trim();
  
  if (!email) {
    showToast({
      type: 'warning',
      title: 'Email Required',
      message: 'Please enter your email address first'
    });
    return;
  }
  
  auth.sendPasswordResetEmail(email)
    .then(() => {
      showToast({
        type: 'success',
        title: 'Reset Email Sent',
        message: 'Check your inbox for password reset instructions'
      });
    })
    .catch((error) => {
      let message = 'Failed to send reset email';
      if (error.code === 'auth/user-not-found') {
        message = 'No account found with this email';
      }
      showToast({
        type: 'error',
        title: 'Error',
        message: message
      });
    });
}

// ==================== LOGIN FUNCTION ====================
async function handleLogin() {
  const email = document.getElementById('emailInput').value.trim();
  const password = document.getElementById('passwordInput').value;
  const btn = document.getElementById('loginBtn');

  if (!email || !password) {
    showToast({
      type: 'warning',
      title: 'Missing Information',
      message: 'Please enter both email and password'
    });
    return;
  }

  // Validate email format
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    showToast({
      type: 'error',
      title: 'Invalid Email',
      message: 'Please enter a valid email address'
    });
    return;
  }

  // Disable button and show loading
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Logging in...';

  try {
    // Attempt login
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const user = userCredential.user;

    // Update last login timestamp (optional - don't wait for it)
    try {
      await db.collection('users').doc(user.uid).update({
        lastLogin: firebase.firestore.FieldValue.serverTimestamp()
      });
    } catch (updateErr) {
      console.warn('Could not update last login:', updateErr);
    }

    // Show success toast
    showToast({
      type: 'success',
      title: 'Login Successful!',
      message: 'Redirecting to your dashboard...',
      duration: 1500
    });

    // Redirect to home page
    setTimeout(() => {
      window.location.href = 'home.html';
    }, 1500);

  } catch (err) {
    console.error('Login error:', err);

    let message = 'Login failed. Please try again.';
    let title = 'Login Failed';

    if (err.code === 'auth/user-not-found') {
      title = 'Account Not Found';
      message = 'No account found with this email. Please sign up first.';
    } else if (err.code === 'auth/wrong-password') {
      title = 'Incorrect Password';
      message = 'The password you entered is incorrect.';
    } else if (err.code === 'auth/invalid-email') {
      title = 'Invalid Email';
      message = 'Please enter a valid email address.';
    } else if (err.code === 'auth/user-disabled') {
      title = 'Account Disabled';
      message = 'This account has been disabled. Contact support.';
    } else if (err.code === 'auth/too-many-requests') {
      title = 'Too Many Attempts';
      message = 'Too many failed attempts. Please try again later.';
    } else if (err.code === 'auth/network-request-failed') {
      title = 'Network Error';
      message = 'Please check your internet connection.';
    } else if (err.code === 'auth/invalid-credential') {
      title = 'Invalid Credentials';
      message = 'Invalid email or password. Please check and try again.';
    }

    showToast({
      type: 'error',
      title: title,
      message: message,
      duration: 5000
    });

    // Re-enable button
    btn.disabled = false;
    btn.innerHTML = '<span>Login to Dashboard</span><i class="fas fa-arrow-right"></i>';
  }
}

// ==================== ENTER KEY SUPPORT ====================
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    handleLogin();
  }
});

// Make functions global
window.togglePassword = togglePassword;
window.showForgotPassword = showForgotPassword;
</script>
</body>
</html>
