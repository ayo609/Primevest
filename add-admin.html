<!DOCTYPE html>
<html>
<head>
  <title>Create Admin</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <h2>Create Admin User</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <input type="text" id="fullName" placeholder="Full Name"><br>
  <button onclick="createAdmin()">Create Admin</button>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAi8lV4LUb57ele6K1wo73vc13mGz1v9B0",
      authDomain: "primevest-5208c.firebaseapp.com",
      projectId: "primevest-5208c",
      storageBucket: "primevest-5208c.firebasestorage.app",
      messagingSenderId: "76160486147",
      appId: "1:76160486147:web:5b5853f9772503daa7b736"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    async function createAdmin() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const fullName = document.getElementById('fullName').value;

      try {
        // Create auth user
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // Create admin document
        await db.collection('users').doc(user.uid).set({
          uid: user.uid,
          email: email,
          fullName: fullName,
          username: email.split('@')[0],
          phone: '',
          isAdmin: true,
          balance: 0,
          totalInvested: 0,
          totalEarnings: 0,
          totalRefEarnings: 0,
          referralCount: 0,
          level1Count: 0,
          level2Count: 0,
          level3Count: 0,
          welcomeBonusPaid: true,
          role: 'super_admin',
          permissions: [
            'manage_users',
            'manage_deposits',
            'manage_withdrawals',
            'manage_investments',
            'manage_gifts',
            'manage_proofs',
            'view_reports'
          ],
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          lastLogin: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert('Admin created successfully!');
      } catch (error) {
        console.error(error);
        alert('Error: ' + error.message);
      }
    }
  </script>
</body>
</html>
